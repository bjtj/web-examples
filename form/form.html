<!DOCTYPE html>
<html>
    <head>
        <title>Input Example</title>
        <style type="text/css" media="screen">
         .fieldset { margin: 1em; }
         legend { font-weight: bold; }
        </style>
    </head>
    <body>
        <div class="fieldset">
            <legend>POST</legend>
            <form method="post" id="" action="/post.php">
                <input type="text" name="name" value="" placeholder="name" />
                <button>Post</button>
            </form>
        </div>
        <div class="fieldset">
            <legend>onSubmit</legend>
            <form onSubmit="let data = new FormData(event.target); console.log(data); document.getElementById('data').innerHTML = JSON.stringify(Object.fromEntries(data.entries())); event.preventDefault();">
                <input type="text" name="name" value="" placeholder="name" />
                <button>Click</button>
            </form>
            <pre id="data"></pre>
        </div>
    </body>
</html>
